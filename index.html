<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ANDROMEDA CRM</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/config.example.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <main id="app">
    <section id="authView" class="auth-card">
      <div class="brand">ANDROMEDA</div>
      <h1>CRM SMM</h1>
      <p>Войдите через Supabase Auth. Логин — email, пароль хранится только в Supabase Auth.</p>
      <form id="loginForm">
        <label>Email<input id="email" type="email" autocomplete="email" required /></label>
        <label>Пароль<input id="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit">Войти</button>
        <div id="authError" class="error" role="alert"></div>
      </form>
    </section>

    <section id="crmView" class="hidden shell">
      <aside class="sidebar">
        <div class="brand">ANDROMEDA</div>
        <div id="userBox" class="user-box"></div>
        <button data-view="tasks" class="nav active">Задачи</button>
        <button data-view="team" class="nav">Команда</button>
        <button data-view="profile" class="nav">Профиль</button>
        <button id="logoutBtn" class="ghost">Выйти</button>
      </aside>

      <section class="content">
        <header class="topbar">
          <h2 id="pageTitle">Задачи</h2>
          <button id="newTaskBtn">+ Создать задачу</button>
        </header>

        <section id="tasksPanel" class="panel">
          <div class="filters">
            <input id="searchInput" placeholder="Поиск по задачам" />
            <select id="statusFilter"></select>
          </div>
          <div id="tasksList" class="cards"></div>
        </section>

        <section id="teamPanel" class="panel hidden">
          <h3>Команда</h3>
          <div id="teamList" class="team-grid"></div>
        </section>

        <section id="profilePanel" class="panel hidden">
          <h3>Профиль</h3>
          <div id="profileData"></div>
          <button id="resetPasswordBtn" class="ghost">Отправить письмо для смены пароля</button>
        </section>
      </section>
    </section>
  </main>

  <dialog id="taskDialog">
    <form id="taskForm" method="dialog">
      <h3 id="taskDialogTitle">Новая задача</h3>
      <input type="hidden" id="taskId" />
      <label>Тема<input id="taskTitle" required maxlength="160" /></label>
      <label>Описание<textarea id="taskDescription" rows="4"></textarea></label>
      <div class="grid-2">
        <label>Статус<select id="taskStatus"></select></label>
        <label>Дедлайн<input id="taskDate" type="date" /></label>
      </div>
      <label>Исполнители<select id="taskExecutors" multiple></select></label>
      <menu>
        <button type="button" id="cancelTaskBtn" class="ghost">Отмена</button>
        <button type="submit">Сохранить</button>
      </menu>
      <div id="taskError" class="error"></div>
    </form>
  </dialog>
</body>
</html>
